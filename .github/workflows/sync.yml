name: Sync Bitrix24 data (Victory)

on:
  schedule:
    # МСК = UTC+3 → 06:00 МСК = 03:00 UTC, 18:00 МСК = 15:00 UTC
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run sync script
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          BITRIX_SOURCE_NAME: "Victory парсинг"
        run: node scripts/sync-bitrix.js

      - name: Commit updated data
        run: |
          git config user.name "bitrix-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: обновление данных из Bitrix24 [skip ci]"
          git push

      # Отчёт в Telegram шлём только после вечернего запуска (18:00 МСК = 15:00 UTC)
      # или при ручном запуске (удобно для проверки, что бот вообще работает)
      - name: Send Telegram report
        if: github.event.schedule == '0 15 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/send-telegram-report.js
