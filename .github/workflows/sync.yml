name: Sync Bitrix24 data (Victory)

on:
  schedule:
    # МСК = UTC+3 → 06:00 МСК = 03:00 UTC, 18:00 МСК = 15:00 UTC
    - cron: "0 3 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync script
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          BITRIX_SOURCE_NAME: "Victory парсинг"
        run: node scripts/sync-bitrix.js

      - name: Commit updated data
        run: |
          git config user.name "bitrix-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "chore: обновление данных из Bitrix24 [skip ci]"
          git push
